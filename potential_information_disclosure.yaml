id: potential_information_disclosure_detected

info:
  name: Potential Information Disclosure in web services
  auhtor: XI
  severity: info
  reference: https://XI.com
  tags: templates, XI, information_disclosure, fuzzing


http:
  - method: GET
    path:
      - "{{BaseURL}}/package.json"
      - "{{BaseURL}}/.npmrc"
      - "{{BaseURL}}/openapi.json"
      - "{{BaseURL}}/api-docs"
      - "{{BaseURL}}/graphql"
      - "{{BaseURL}}/graphiql"
      - "{{BaseURL}}/package-lock.json"
      - "{{BaseURL}}/.git/HEAD"
      - "{{BaseURL}}/.git/config"
      - "{{BaseURL}}/robots.txt"
      - "{{BaseURL}}/sitemap.xml"
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/.htaccess"
      - "{{BaseURL}}/.htpasswd"
      - "{{BaseURL}}/.hta"
      - "{{BaseURL}}/cgi-bin/phpinfo.php"
      - "{{BaseURL}}/config.php.bak"
      - "{{BaseURL}}/swagger.json"
      - "{{BaseURL}}/swagger-ui.html"
      - "{{BaseURL}}/.gitlab-ci.yml"
      - "{{BaseURL}}/Jenkinsfile"
      - "{{BaseURL}}/backup.bak"
      - "{{BaseURL}}/database.bak"


    stop-at-first-match: false
    matchers:
      - type: status
        status: 
          - 301
          - 302
          - 303
          - 304
          - 305
          - 307
          - 308